<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container  container--flex--column">
            <img class="header__logo" src="./images/mdi_drivers-license-outline.svg" alt="">
            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastar1</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input  contact-form__input--metade" 
                                name="nome"
                                id="nome" 
                                placeholder="Nome"
                                type="text">

                        <input class="contact-form__input  contact-form__input--metade" 
                                    name="sobrenome"                                    
                                    id="sobrenome" 
                                    placeholder="Sobrenome"
                                    type="text">
                    </div>
                </div>


            
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">Email</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input
                                class="contact-form__input  contact-form__input--inteiro" 
                                name="email"
                                id="email" 
                                placeholder="E-mail"
                                type="text">
                    </div>
            </form>
        </div>
    </main>
</body>

</html>
